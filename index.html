<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JARVIS AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    #chat {
      width: 90%;
      max-width: 600px;
      margin: auto;
      margin-top: 20px;
    }

    .msg {
      background: #1f1f1f;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>JARVIS AI</h1>

<div id="chat"></div>

<input id="input" placeholder="Escribe tu pregunta...">
<button onclick="send()">Enviar</button>

<script>
async function send() {
  let text = document.getElementById("input").value;

  document.getElementById("chat").innerHTML +=
    "<div class='msg'><b>Tú:</b> " + text + "</div>";

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  let data = await res.json();

  document.getElementById("chat").innerHTML +=
    "<div class='msg'><b>Jarvis:</b> " + data.reply + "</div>";

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
