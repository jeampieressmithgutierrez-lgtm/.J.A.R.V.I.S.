<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #1a0000, #000);
    color: #FFD700;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* CHAT */
#chat {
    height: 400px;
    overflow-y: auto;
    padding: 10px;
}

/* BURBUJAS */
.message {
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #8B0000;
    color: white;
    margin-left: auto;
}

.bot {
    background: #111;
    border: 1px solid gold;
}

/* INPUT */
.input-box {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
    background: black;
    color: gold;
    border: none;
}

button {
    padding: 10px;
    background: gold;
    border: none;
}
</style>
</head>

<body>

<div class="container">
<h1>JARVIS AI</h1>

<div id="chat"></div>

<div class="input-box">
<input id="msg" placeholder="Habla, señor...">
<button onclick="send()">Enviar</button>
</div>

</div>

<script>
function typeEffect(element, text, speed = 20) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

async function send() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let text = input.value;

    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = text;
    chat.appendChild(userDiv);

    let botDiv = document.createElement("div");
    botDiv.className = "message bot";
    chat.appendChild(botDiv);

    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();

    typeEffect(botDiv, data.reply);

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
